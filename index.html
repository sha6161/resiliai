<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ResilliAI — Cognitive Resilience Training</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600&family=DM+Mono&display=swap" rel="stylesheet" />
  <style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --green: #1D9E75; --green-dark: #0F6E56; --green-light: #E1F5EE; --green-mid: #5DCAA5;
  --red: #E24B4A; --red-light: #FCEBEB;
  --amber: #EF9F27; --amber-light: #FAEEDA;
  --blue: #378ADD; --blue-light: #E6F1FB;
  --purple: #8B5CF6; --purple-light: #EDE9FE;
  --text: #1A1A1A; --text-2: #5A5A5A; --text-3: #909090;
  --border: #E8E8E8; --border-2: #D0D0D0;
  --bg: #FAFAF8; --bg-2: #F3F3F0; --bg-3: #ECEAE6;
  --white: #FFFFFF;
  --font-display: 'DM Serif Display', Georgia, serif;
  --font-body: 'DM Sans', system-ui, sans-serif;
  --font-mono: 'DM Mono', monospace;
  --radius: 10px; --radius-sm: 6px; --radius-lg: 14px;
}

html { font-size: 15px; }
body { font-family: var(--font-body); background: var(--bg); color: var(--text); min-height: 100vh; line-height: 1.5; }
.hidden { display: none !important; }

/* TOPBAR */
.topbar {
  display: flex; align-items: center; justify-content: space-between;
  padding: 0 28px; height: 58px;
  background: var(--white); border-bottom: 1px solid var(--border);
  position: sticky; top: 0; z-index: 100;
}
.logo { font-family: var(--font-display); font-size: 20px; letter-spacing: -0.3px; }
.logo span { color: var(--green); font-style: italic; }
.nav { display: flex; gap: 2px; }
.nav-btn {
  padding: 6px 14px; border-radius: var(--radius-sm); font-size: 13px; font-weight: 500;
  cursor: pointer; border: none; background: transparent; color: var(--text-2);
  font-family: var(--font-body); transition: all 0.15s;
}
.nav-btn:hover { background: var(--bg-2); color: var(--text); }
.nav-btn.active { background: var(--bg-2); color: var(--text); }

/* STATE PILL */
.state-pill {
  display: inline-flex; align-items: center; gap: 6px;
  padding: 5px 12px; border-radius: 20px; font-size: 12px; font-weight: 500;
  flex-shrink: 0; transition: all 0.3s;
}
.state-dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
.state-reflective { background: var(--green-light); color: #085041; }
.state-reflective .state-dot { background: var(--green); }
.state-thoughtless { background: var(--red-light); color: #791F1F; }
.state-thoughtless .state-dot { background: var(--red); }
.state-cautious { background: var(--amber-light); color: #633806; }
.state-cautious .state-dot { background: var(--amber); }
.state-collaborative { background: var(--blue-light); color: #0C447C; }
.state-collaborative .state-dot { background: var(--blue); }

/* LAYOUT */
.content { flex: 1; padding: 28px; max-width: 1100px; margin: 0 auto; width: 100%; }

/* METRICS */
.metrics { display: grid; grid-template-columns: repeat(4,1fr); gap: 12px; margin-bottom: 28px; }
.metric { background: var(--white); border: 1px solid var(--border); border-radius: var(--radius); padding: 18px; }
.metric-label { font-size: 11px; font-weight: 600; color: var(--text-3); text-transform: uppercase; letter-spacing: 0.6px; margin-bottom: 8px; }
.metric-value { font-size: 26px; font-weight: 600; font-family: var(--font-display); }
.metric-sub { font-size: 12px; color: var(--text-2); margin-top: 4px; }

.section-title { font-size: 11px; font-weight: 600; color: var(--text-3); text-transform: uppercase; letter-spacing: 0.6px; margin-bottom: 14px; }

/* DIM CARDS */
.dims-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 28px; }
.dim-card { background: var(--white); border: 1px solid var(--border); border-radius: var(--radius); padding: 16px; transition: border-color 0.15s; }
.dim-card:hover { border-color: var(--border-2); }
.dim-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
.dim-name { font-size: 14px; font-weight: 500; }
.dim-level { font-size: 11px; font-weight: 500; padding: 3px 10px; border-radius: 20px; }
.level-1 { background: var(--red-light); color: #A32D2D; }
.level-2 { background: var(--amber-light); color: #854F0B; }
.level-3 { background: var(--green-light); color: #0F6E56; }
.level-4 { background: var(--blue-light); color: #185FA5; }
.progress-track { height: 5px; background: var(--bg-2); border-radius: 3px; overflow: hidden; margin-bottom: 10px; }
.progress-fill { height: 100%; border-radius: 3px; transition: width 0.7s ease; }
.fill-1 { background: var(--red); } .fill-2 { background: var(--amber); }
.fill-3 { background: var(--green); } .fill-4 { background: var(--blue); }
.dim-desc { font-size: 12px; color: var(--text-2); line-height: 1.6; }

/* HISTORY */
.history-section { margin-bottom: 28px; }
.history-rows { display: flex; flex-direction: column; gap: 12px; }
.history-row { display: flex; align-items: center; gap: 12px; }
.history-label { font-size: 12px; color: var(--text-2); width: 150px; flex-shrink: 0; }
.history-bars { flex: 1; display: flex; gap: 4px; align-items: flex-end; height: 36px; background: var(--bg-2); border-radius: var(--radius-sm); padding: 4px 6px 0; }
.history-bar { flex: 1; border-radius: 2px 2px 0 0; min-height: 4px; transition: height 0.5s ease; position: relative; cursor: default; }
.history-bar:hover::after { content: attr(data-val); position: absolute; top: -22px; left: 50%; transform: translateX(-50%); font-size: 10px; background: var(--text); color: white; padding: 2px 6px; border-radius: 4px; white-space: nowrap; pointer-events: none; }
.history-score { font-size: 13px; font-weight: 600; width: 28px; text-align: right; flex-shrink: 0; }

/* BUTTONS */
.btn { display: inline-flex; align-items: center; gap: 6px; padding: 9px 18px; border-radius: var(--radius-sm); font-size: 13px; font-weight: 500; cursor: pointer; border: 1px solid var(--border-2); background: var(--white); color: var(--text); font-family: var(--font-body); transition: all 0.15s; text-decoration: none; }
.btn:hover { background: var(--bg-2); }
.btn-primary { background: var(--green); border-color: var(--green); color: white; }
.btn-primary:hover { background: var(--green-dark); border-color: var(--green-dark); }
.btn-danger { background: var(--red-light); border-color: #F09595; color: #791F1F; }
.btn-danger:hover { background: #F7C1C1; }
.btn-sm { padding: 6px 12px; font-size: 12px; }
.actions { display: flex; gap: 10px; flex-wrap: wrap; margin-top: 4px; }

/* QUIZ */
.quiz-wrap { max-width: 600px; margin: 0 auto; }
.quiz-card { background: var(--white); border: 1px solid var(--border); border-radius: var(--radius-lg); padding: 30px; }
.quiz-prog-bar { height: 3px; background: var(--bg-2); border-radius: 2px; margin-bottom: 28px; overflow: hidden; }
.quiz-prog-fill { height: 100%; background: var(--green); transition: width 0.3s ease; }
.quiz-dim-tag { display: inline-block; font-size: 11px; font-weight: 500; padding: 3px 10px; border-radius: 20px; margin-bottom: 14px; background: var(--green-light); color: #0F6E56; letter-spacing: 0.3px; }
.quiz-q { font-size: 16px; font-weight: 500; margin-bottom: 22px; line-height: 1.5; }
.quiz-options { display: flex; flex-direction: column; gap: 9px; }
.quiz-option { padding: 12px 16px; border-radius: var(--radius-sm); border: 1px solid var(--border); font-size: 13px; cursor: pointer; transition: all 0.15s; text-align: left; background: var(--white); color: var(--text); font-family: var(--font-body); line-height: 1.4; }
.quiz-option:hover { border-color: var(--green-mid); background: var(--green-light); color: #085041; }
.quiz-option.selected { border-color: var(--green); background: var(--green-light); color: #085041; font-weight: 500; }
.quiz-nav { display: flex; justify-content: space-between; align-items: center; margin-top: 22px; }
.quiz-counter { font-size: 12px; color: var(--text-3); }

/* TRAINING */
.exercise-panel { display: grid; grid-template-columns: 230px 1fr; gap: 16px; }
.ex-sidebar { display: flex; flex-direction: column; gap: 8px; }
.sidebar-title { font-size: 11px; font-weight: 600; color: var(--text-3); text-transform: uppercase; letter-spacing: 0.6px; margin-bottom: 4px; }
.dim-filters { display: flex; flex-wrap: wrap; gap: 5px; margin-bottom: 10px; }
.filter-btn { font-size: 11px; padding: 4px 10px; border-radius: 20px; cursor: pointer; border: 1px solid var(--border); background: var(--white); color: var(--text-2); font-family: var(--font-body); transition: all 0.15s; }
.filter-btn:hover { border-color: var(--green-mid); }
.filter-btn.active { background: var(--green-light); border-color: var(--green-mid); color: #085041; font-weight: 500; }
.ex-list { display: flex; flex-direction: column; gap: 5px; }
.ex-item { padding: 11px 13px; border-radius: var(--radius-sm); border: 1px solid var(--border); cursor: pointer; transition: all 0.15s; background: var(--white); }
.ex-item:hover { border-color: var(--border-2); }
.ex-item.active { border-color: var(--green); background: var(--green-light); }
.ex-item.done { border-color: var(--green-mid); }
.ex-item-title { font-size: 12px; font-weight: 500; margin-bottom: 3px; }
.ex-item.active .ex-item-title { color: #085041; }
.ex-item.done .ex-item-title { color: var(--green-dark); }
.ex-item-dim { font-size: 11px; color: var(--text-3); }
.ex-item.active .ex-item-dim { color: #0F6E56; }

.ex-main { background: var(--white); border: 1px solid var(--border); border-radius: var(--radius-lg); padding: 24px; display: flex; flex-direction: column; gap: 16px; min-height: 420px; }
.ex-header { display: flex; align-items: flex-start; gap: 10px; }
.ex-title-wrap { flex: 1; }
.ex-title { font-size: 16px; font-weight: 600; margin-bottom: 3px; }
.ex-dim-sub { font-size: 12px; color: var(--text-3); }
.ex-badge { font-size: 10px; padding: 3px 10px; border-radius: 20px; font-weight: 500; background: var(--blue-light); color: #185FA5; white-space: nowrap; flex-shrink: 0; margin-top: 2px; }
.ex-prompt { background: var(--bg-2); border-radius: var(--radius-sm); padding: 14px; font-size: 13px; line-height: 1.7; }
.ex-prompt strong { font-weight: 600; }
.field-label { font-size: 11px; font-weight: 600; color: var(--text-3); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 7px; }
.user-textarea { width: 100%; border: 1px solid var(--border-2); border-radius: var(--radius-sm); padding: 12px 14px; font-size: 13px; font-family: var(--font-body); resize: vertical; min-height: 90px; background: var(--white); color: var(--text); outline: none; line-height: 1.6; transition: border 0.15s; }
.user-textarea:focus { border-color: var(--green); }
.user-textarea::placeholder { color: var(--text-3); }
.ex-actions { display: flex; gap: 8px; align-items: center; }

.hint-box { background: var(--bg-2); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 13px 15px; font-size: 13px; line-height: 1.6; color: var(--text-2); }

/* FEEDBACK CARDS */
.feedback-box { border-radius: var(--radius-sm); padding: 16px; font-size: 13px; line-height: 1.7; border: 1px solid var(--border); }
.feedback-box.good { background: var(--green-light); border-color: var(--green-mid); color: #085041; }
.feedback-box.warn { background: var(--amber-light); border-color: var(--amber); color: #633806; }
.feedback-box.weak { background: var(--red-light); border-color: #F09595; color: #791F1F; }
.feedback-label { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.6px; margin-bottom: 8px; opacity: 0.7; }

.score-badge { display: inline-flex; align-items: center; gap: 6px; font-size: 13px; font-weight: 600; margin-bottom: 8px; }
.score-bar-wrap { height: 4px; background: rgba(0,0,0,0.1); border-radius: 2px; margin-bottom: 12px; overflow: hidden; }
.score-bar-fill { height: 100%; border-radius: 2px; transition: width 0.5s ease; }

.checklist { display: flex; flex-direction: column; gap: 6px; margin: 10px 0; }
.check-item { display: flex; align-items: flex-start; gap: 8px; font-size: 13px; line-height: 1.5; }
.check-icon { font-size: 14px; flex-shrink: 0; margin-top: 1px; }

.next-step { margin-top: 12px; padding-top: 12px; border-top: 1px solid rgba(0,0,0,0.08); font-size: 12px; font-weight: 500; }

.ai-response-box { border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 14px; font-size: 13px; line-height: 1.7; background: var(--bg); white-space: pre-line; color: var(--text-2); }
.notice { font-size: 12px; color: var(--text-2); background: var(--bg-2); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 10px 14px; margin-bottom: 16px; }
.notice strong { color: var(--green-dark); font-weight: 600; }

/* STREAK / XP */
.xp-bar-wrap { background: var(--white); border: 1px solid var(--border); border-radius: var(--radius); padding: 16px; margin-bottom: 12px; }
.xp-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
.xp-label { font-size: 12px; font-weight: 500; color: var(--text-2); }
.xp-val { font-size: 12px; font-weight: 600; color: var(--purple); }
.xp-track { height: 6px; background: var(--bg-2); border-radius: 3px; overflow: hidden; }
.xp-fill { height: 100%; background: var(--purple); border-radius: 3px; transition: width 0.6s ease; }

/* RESPONSIVE */
@media (max-width: 760px) {
  .metrics { grid-template-columns: 1fr 1fr; }
  .dims-grid { grid-template-columns: 1fr; }
  .exercise-panel { grid-template-columns: 1fr; }
  .topbar { padding: 0 16px; }
  .content { padding: 16px; }
}
@media (max-width: 480px) {
  .metrics { grid-template-columns: 1fr; }
  .state-pill span:last-child { display: none; }
}
  </style>
</head>
<body>
  <div id="app">
    <header class="topbar">
      <div class="logo">Resilli<span>AI</span></div>
      <nav class="nav">
        <button class="nav-btn active" data-view="dashboard" onclick="showView('dashboard')">Dashboard</button>
        <button class="nav-btn" data-view="assessment" onclick="showView('assessment')">Assessment</button>
        <button class="nav-btn" data-view="training" onclick="showView('training')">Training</button>
      </nav>
      <div id="state-indicator" class="state-pill state-reflective">
        <span class="state-dot"></span>
        <span id="state-text">Reflective</span>
      </div>
    </header>
    <main class="content">
      <div id="view-dashboard"></div>
      <div id="view-assessment" class="hidden"></div>
      <div id="view-training" class="hidden"></div>
    </main>
  </div>
  <script>
const DIMS = ["Critical Evaluation","Cognitive Autonomy","Adaptive Regulation","Reflective Integration"];
const LEVEL_LABELS = ["","Dependent","Emerging","Engaged","Resilient"];
const LEVEL_DESC = {
  "Critical Evaluation": ["","Accepts AI output without questioning. Rarely checks for errors or bias.","Occasionally checks claims when prompted. Spots obvious errors sometimes.","Regularly cross-checks AI claims and spots bias in most interactions.","Always verifies, challenges reasoning, and catches hallucinations confidently."],
  "Cognitive Autonomy": ["","Defaults to AI before forming own ideas. Frequently copies output unchanged.","Sometimes generates ideas independently but often leans on AI first.","Usually thinks through problems before using AI. Maintains own voice.","Consistently thinks independently. AI supplements, never replaces, own reasoning."],
  "Adaptive Regulation": ["","Uses AI for everything without discretion. No sense of when to stop.","Occasionally considers whether AI is appropriate for the task.","Usually knows when and how to limit AI use based on learning goals.","Strategically regulates AI use. Has personal rules and follows them."],
  "Reflective Integration": ["","Doesn't reflect on AI-assisted work. Cannot separate own ideas from AI's.","Reflects occasionally after difficult tasks. Vague about what was learned.","Often articulates what they personally contributed vs. what AI provided.","Consistently distinguishes own learning from AI output. Deepens understanding."]
};

const QUESTIONS = [
  {dim:"Critical Evaluation",q:"When AI gives you an answer, how often do you check if it's accurate?",opts:["Never — I trust it completely","Rarely, only if something seems off","Sometimes, for important tasks","Always, before using anything"]},
  {dim:"Critical Evaluation",q:"If AI cites a study or statistic, what do you do?",opts:["Use it directly","Note it looks credible","Try to verify the source","Always look up the original"]},
  {dim:"Critical Evaluation",q:"How confident are you at spotting AI-generated errors or bias?",opts:["Not confident at all","Slightly confident","Fairly confident","Very confident"]},
  {dim:"Cognitive Autonomy",q:"When starting an essay or problem, what do you do first?",opts:["Open AI immediately","Think briefly, then ask AI","Draft my own ideas first","Work it through fully before AI"]},
  {dim:"Cognitive Autonomy",q:"How often do you use AI output directly with minimal changes?",opts:["Almost always","Often","Sometimes","Rarely or never"]},
  {dim:"Cognitive Autonomy",q:"Could you explain the ideas in your AI-assisted work without the AI?",opts:["No, not really","Maybe the basic points","Yes, most of it","Yes, completely"]},
  {dim:"Adaptive Regulation",q:"How do you decide when to use AI vs. work independently?",opts:["I use it for everything","I use it when I'm stuck","I think about the learning goal","I have clear rules I follow"]},
  {dim:"Adaptive Regulation",q:"Have you ever chosen NOT to use AI because it would undermine your learning?",opts:["Never thought about it","Rarely","Sometimes","Regularly"]},
  {dim:"Adaptive Regulation",q:"How well do you know which tasks AI helps with vs. hurts?",opts:["Not at all","Somewhat","Pretty well","Very well"]},
  {dim:"Reflective Integration",q:"After an AI-assisted session, do you reflect on what YOU actually learned?",opts:["Never","Sometimes if it was hard","Often","Always"]},
  {dim:"Reflective Integration",q:"Can you explain the difference between the AI's contribution and your own?",opts:["They're the same thing to me","Vaguely","Usually yes","Always clearly"]},
  {dim:"Reflective Integration",q:"How much does using AI deepen your understanding vs. just help you finish tasks?",opts:["It just helps me finish","Mostly finishing, some learning","Balanced","It consistently deepens understanding"]}
];

const EXERCISES = [
  {
    id:0, dim:"Critical Evaluation", title:"Spot the hallucination", badge:"Error Detection",
    prompt:`Below is an AI-generated answer to <em>"What causes students to over-rely on AI?"</em><br><br>Read carefully and identify every error, unsupported claim, or hallucinated reference you can find.`,
    aiResponse:`Research shows that students over-rely on AI primarily due to three factors. First, cognitive offloading — described by Sweller (1988) in his landmark Cognitive Load Theory paper — causes students to outsource thinking to reduce mental effort. Second, a 2023 MIT study by Dr. Karen Chen found that 78% of students who used ChatGPT daily showed a 40% reduction in independent recall within six weeks. Third, the OECD's 2024 Digital Learning Report confirmed that AI-reliant students scored 2.3 grade points lower on analytical tasks globally.`,
    hint:"The MIT study by 'Dr. Karen Chen' and the OECD statistics are fabricated. The Sweller citation is real but check whether it says what the AI claims.",
    keywords:["karen chen","mit","oecd","hallucin","fabricat","made up","doesn't exist","fake","false","wrong","inaccurat","not real","2.3","78%","40%","sweller","cognitive load"],
    checkItems:["Identify the fake MIT study","Spot the fabricated OECD statistics","Question whether the Sweller claim is accurate"]
  },
  {
    id:1, dim:"Critical Evaluation", title:"Bias detective", badge:"Bias Detection",
    prompt:`Read this AI paragraph about ChatGPT in education. Identify any one-sided framing, missing perspectives, or rhetorical bias.`,
    aiResponse:`ChatGPT has revolutionized education by giving every student access to a personal tutor available 24/7. Students no longer struggle alone — they can get instant, accurate explanations on any topic at any time. Teachers who embrace this technology report higher student engagement and better learning outcomes. The evidence overwhelmingly shows that AI integration in classrooms leads to improved academic performance and greater student confidence.`,
    hint:"Notice absolute language ('revolutionized', 'overwhelmingly'), missing counterevidence, and treating AI benefits as settled fact when research is actually mixed.",
    keywords:["one-sided","bias","overwhelm","absolute","missing","counter","research is mixed","not proven","only positive","no negative","revolution","settled","fact"],
    checkItems:["Spot the absolute/exaggerated language","Notice what perspectives are missing","Identify claims presented as fact without evidence"]
  },
  {
    id:2, dim:"Critical Evaluation", title:"Prompt quality test", badge:"Prompt Analysis",
    prompt:`Compare these two student prompts. Which shows stronger critical thinking — and why?<br><br><strong>Prompt A:</strong> "Write me an essay on climate change and education."<br><br><strong>Prompt B:</strong> "I'm writing about how climate anxiety affects student engagement. What are 3 competing perspectives researchers have taken, and what evidence supports each? Don't include opinions — only cite findings."`,
    aiResponse:`Prompt B demonstrates substantially stronger critical thinking. It specifies a narrow research question, requests multiple perspectives, excludes opinion to prioritize evidence, and frames the AI as a research assistant rather than a ghostwriter. Prompt A outsources the entire intellectual task to the AI, leaving nothing for the student to contribute cognitively.`,
    hint:"Think about what each prompt asks the student to do vs. what it asks the AI to do. Where does the thinking happen in each case?",
    keywords:["prompt b","b is better","b shows","specific","narrow","perspectives","evidence","ghostwriter","outsource","thinking","reasoning","critical"],
    checkItems:["Explain why Prompt B is stronger","Describe what Prompt A outsources","Connect prompt quality to cognitive effort"]
  },
  {
    id:3, dim:"Cognitive Autonomy", title:"Think first, then compare", badge:"Independent Thinking",
    prompt:`<strong>Before you see any AI response</strong>, write your own answer to:<br><br><em>"Why might a student who uses AI heavily struggle on an exam?"</em><br><br>Write at least 2–3 sentences in your own words, then submit.`,
    aiResponse:`Students who rely heavily on AI may struggle on exams because they have outsourced the cognitive work of understanding, retaining, and reasoning through material. When AI handles summarization, structuring, and problem-solving during study sessions, students lose practice retrieving information independently — the primary mechanism that builds long-term memory. Additionally, exam conditions require drawing on internal knowledge without external scaffolding, exposing gaps that AI use had masked.`,
    hint:"Compare your answer to the reference. Did you cover similar ideas? Did you express them differently? The difference is your cognitive autonomy.",
    keywords:["memory","recall","retrieval","understand","depend","rely","exam","scaffold","independent","think","cogni","struggle","outsourc"],
    checkItems:["Give at least 2 reasons in your own words","Explain the mechanism, not just the outcome","Avoid copying the reference response"]
  },
  {
    id:4, dim:"Cognitive Autonomy", title:"Rewrite in your own voice", badge:"Voice & Ownership",
    prompt:`Rewrite this AI paragraph in completely your own words. Same core idea — but sound like <em>you</em> wrote it. Don't just rearrange words.`,
    aiResponse:`The proliferation of generative AI tools in educational settings has created a paradox wherein the technologies designed to support learning may simultaneously undermine the cognitive processes that education seeks to develop. Students who habitually delegate intellectual labor to AI systems risk atrophying the very skills — critical reasoning, synthesis, and independent judgment — that their academic training is intended to cultivate.`,
    hint:"A good rewrite doesn't use key phrases like 'proliferation', 'paradox', or 'atrophying'. If you kept them, rewrite again.",
    keywords:["ai","tools","learn","student","skill","think","develop","education","weaken","lose","depend","help","hurt","undermine","grow","practice"],
    checkItems:["Avoid using the original's key vocabulary","Preserve the core meaning","Sound natural, not academic"]
  },
  {
    id:5, dim:"Cognitive Autonomy", title:"Argue against the AI", badge:"Counter-Argument",
    prompt:`Write the strongest counter-argument to this AI claim. Challenge its <em>reasoning</em>, not just its conclusion.<br><br><em>"Students should use AI freely for all writing tasks because writing quality is what matters, not the process that produced it."</em>`,

// ===== SMART FEEDBACK ENGINE (no API required) =====
// Analyzes student responses using keyword detection, length, structure,
// and exercise-specific rubrics to generate meaningful, specific feedback.

function analyzResponse(exerciseId, userText) {
  const ex = EXERCISES.find(e => e.id === exerciseId);
  const text = userText.toLowerCase().trim();
  const wordCount = userText.trim().split(/\s+/).filter(Boolean).length;
  const sentences = userText.split(/[.!?]+/).filter(s => s.trim().length > 5).length;

  // ---- baseline checks ----
  if (wordCount < 10) return { score: 0, quality: 'weak', title: 'Too short', summary: 'Your response is too brief to evaluate. Write at least 2–3 sentences engaging with the exercise.', checks: [], nextStep: 'Go back and write a full response before submitting.' };
  if (wordCount < 25) return { score: 1, quality: 'weak', title: 'Needs more depth', summary: 'Your response is a start, but it needs more development. The exercise requires you to reason through ideas, not just state them.', checks: [], nextStep: 'Expand your answer with at least one explanation of why, not just what.' };

  // ---- keyword hit rate ----
  const keywords = ex.keywords || [];
  const hits = keywords.filter(kw => text.includes(kw.toLowerCase()));
  const hitRate = keywords.length > 0 ? hits.length / keywords.length : 0.5;

  // ---- exercise-specific rubric ----
  const rubric = getRubric(exerciseId, text, wordCount, sentences, hitRate);

  return rubric;
}

function getRubric(id, text, wordCount, sentences, hitRate) {
  const ex = EXERCISES.find(e => e.id === id);
  const checks = ex.checkItems || [];

  // score each check item by detecting relevant content
  const checkResults = checks.map(item => {
    // rough heuristic: does the response contain thematic content for this check?
    const relevant = hitRate > 0.15 || wordCount > 60;
    return { label: item, passed: relevant };
  });

  // ---- per-exercise logic ----
  switch(id) {

    case 0: { // Spot the hallucination
      const foundMIT = text.includes('karen') || text.includes('mit') || text.includes('78') || text.includes('40%');
      const foundOECD = text.includes('oecd') || text.includes('2.3') || text.includes('grade point');
      const foundSweller = text.includes('sweller') || text.includes('cognitive load');
      const count = [foundMIT, foundOECD, foundSweller].filter(Boolean).length;
      checkResults[0].passed = foundMIT;
      checkResults[1].passed = foundOECD;
      checkResults[2].passed = foundSweller;
      if (count === 3) return { score: 4, quality: 'good', title: 'Excellent — all three caught', summary: `You identified all three problems: the fabricated MIT study, the invented OECD statistics, and questioned the Sweller citation. This is exactly what critical evaluation looks like — checking specific claims, not just accepting the overall argument.`, checks: checkResults, nextStep: 'Next level: practice checking citations in papers you actually want to use.' };
      if (count === 2) return { score: 3, quality: 'good', title: 'Good — two issues found', summary: `You caught ${foundMIT?'the MIT study':''}${foundMIT&&foundOECD?' and ':''}${foundOECD?'the OECD statistics':''}${foundSweller?'the Sweller framing':''}. The one you missed is still there — go back and look at each factual claim individually.`, checks: checkResults, nextStep: 'Try fact-checking the claim you missed. What would you search to verify it?' };
      if (count === 1) return { score: 2, quality: 'warn', title: 'Partial — keep looking', summary: `You caught one issue, which shows you're reading critically. But there are two more fabricated or misleading claims in that paragraph. Read each sentence in isolation and ask: could I verify this?`, checks: checkResults, nextStep: 'Re-read the paragraph sentence by sentence. Check every number and citation separately.' };
      return { score: 1, quality: 'weak', title: 'No specific errors identified', summary: `Your response didn't pinpoint specific errors in the text. Saying something "seems wrong" isn't critical evaluation — you need to identify which specific claim is fabricated and why.`, checks: checkResults, nextStep: 'Start with the statistics. Can you find a 2023 MIT study by Dr. Karen Chen on AI and student recall?' };
    }

    case 1: { // Bias detective
      const foundAbsolute = text.includes('overwhelm') || text.includes('revolution') || text.includes('absolute') || text.includes('always') || text.includes('never') || text.includes('all teacher');
      const foundMissing = text.includes('missing') || text.includes('counter') || text.includes('other side') || text.includes('downside') || text.includes('negative') || text.includes('criticism') || text.includes('concern');
      const foundFact = text.includes('evidence') || text.includes('research') || text.includes('study') || text.includes('proof') || text.includes('settled') || text.includes('fact') || text.includes('mixed');
      const count = [foundAbsolute, foundMissing, foundFact].filter(Boolean).length;
      checkResults[0].passed = foundAbsolute;
      checkResults[1].passed = foundMissing;
      checkResults[2].passed = foundFact;
      if (count >= 2) return { score: 4, quality: 'good', title: 'Sharp bias analysis', summary: `You correctly identified the rhetorical tactics: exaggerated language, missing counterevidence, and unsubstantiated claims treated as fact. This is the skill that protects you from being misled by AI-generated content that sounds confident.`, checks: checkResults, nextStep: 'Apply this same lens to the next AI response you use for real work.' };
      if (count === 1) return { score: 2, quality: 'warn', title: 'Partial detection', summary: `You caught one type of bias but missed others. The paragraph uses three distinct rhetorical moves to obscure its one-sidedness. Look at word choice, what's left out, and whether claims have evidence.`, checks: checkResults, nextStep: 'Re-read and highlight every adjective and adverb. Ask: is this a fact or a framing choice?' };
      return { score: 1, quality: 'weak', title: 'Bias not clearly identified', summary: `Your response didn't pinpoint specific bias techniques. Saying the paragraph is "positive" isn't analysis — identify which exact words, claims, or omissions create the one-sided effect.`, checks: checkResults, nextStep: 'Start by highlighting the words "revolutionized" and "overwhelmingly." What do these words do to the reader?' };
    }

    case 2: { // Prompt quality
      const favoursB = text.includes('b') && (text.includes('better') || text.includes('stronger') || text.includes('specific') || text.includes('narrow') || text.includes('evidence') || text.includes('perspective'));
      const explainWhy = text.includes('because') || text.includes('since') || text.includes('as it') || text.includes('which means') || text.includes('this means');
      const mentionsCognition = text.includes('think') || text.includes('outsourc') || text.includes('effort') || text.includes('cognitive') || text.includes('reason') || text.includes('ghostwrit');
      checkResults[0].passed = favoursB;
      checkResults[1].passed = explainWhy && mentionsCognition;
      checkResults[2].passed = mentionsCognition;
      if (favoursB && explainWhy && mentionsCognition) return { score: 4, quality: 'good', title: 'Strong analysis', summary: `You correctly identified that Prompt B shows stronger critical thinking and explained why — the student retains the cognitive work. You also connected prompt quality to learning outcomes, which is the deeper insight here.`, checks: checkResults, nextStep: 'Now write your own Prompt B-style version of the last AI query you made for school.' };
      if (favoursB && explainWhy) return { score: 3, quality: 'good', title: 'Good — needs the cognitive connection', summary: `You correctly chose B and gave reasons. To go deeper: explain what Prompt A actually asks the student to do cognitively (almost nothing), vs. what Prompt B requires the student to contribute.`, checks: checkResults, nextStep: 'Ask yourself: in Prompt A, where does the thinking happen — with the student or the AI?' };
      return { score: 2, quality: 'warn', title: 'Direction right, reasoning thin', summary: `Your response identifies a preference but doesn't fully analyze why. The key question is what each prompt asks the student to contribute — that's what connects prompt quality to learning quality.`, checks: checkResults, nextStep: 'Try analyzing Prompt A by listing what the AI does vs. what the student does.' };
    }

    case 3: { // Think first
      const hasReasoning = text.includes('because') || text.includes('since') || text.includes('when') || text.includes('if') || text.includes('means');
      const coversMemory = text.includes('memory') || text.includes('recall') || text.includes('remember') || text.includes('retain') || text.includes('retriev');
      const coversDependency = text.includes('depend') || text.includes('rely') || text.includes('without') || text.includes('scaffold') || text.includes('exam') || text.includes('no ai') || text.includes('on your own');
      const originalVoice = wordCount > 40 && sentences >= 2;
      checkResults[0].passed = coversMemory || coversDependency;
      checkResults[1].passed = hasReasoning;
      checkResults[2].passed = originalVoice;
      if (coversMemory && coversDependency && hasReasoning) return { score: 4, quality: 'good', title: 'Solid independent thinking', summary: `Good — you explained both the memory/retrieval problem and the exam-dependency trap. The fact that you wrote this before seeing the reference means this reasoning is genuinely yours. That's what cognitive autonomy looks like in practice.`, checks: checkResults, nextStep: 'Compare your answer to the reference. Where did you overlap? Where were you more or less specific?' };
      if ((coversMemory || coversDependency) && hasReasoning) return { score: 3, quality: 'good', title: 'Good reasoning, room to expand', summary: `You covered one key reason with reasoning behind it. There's at least one more mechanism worth exploring — think about what exams specifically demand that AI use during studying doesn't practice.`, checks: checkResults, nextStep: 'Add one more reason. What does exam pressure specifically expose that everyday AI use hides?' };
      if (wordCount > 40) return { score: 2, quality: 'warn', title: 'Ideas present, reasoning thin', summary: `You gave an answer but without much causal reasoning. "They rely on AI so they can't do it alone" describes the problem but doesn't explain the mechanism. What specifically gets lost when you outsource thinking?`, checks: checkResults, nextStep: 'Add "because" after your main claim and force yourself to explain the mechanism.' };
      return { score: 1, quality: 'weak', title: 'Too brief to evaluate independent thinking', summary: `A 2-sentence minimum was requested because it forces you to develop reasoning, not just state a conclusion. The point of this exercise is the process of thinking it through yourself.`, checks: checkResults, nextStep: 'Write at least 2–3 sentences. Start with "Students who use AI heavily struggle on exams because..."' };
    }

    case 4: { // Rewrite in own voice
      const originalPhrases = ['proliferation','paradox','wherein','simultaneously','habitually','delegate','intellectual labor','atrophying','cultivate'];
      const keptPhrases = originalPhrases.filter(p => text.includes(p.toLowerCase()));
      const isGenuinelyRewritten = keptPhrases.length <= 1 && wordCount > 25;
      const hasSubstance = wordCount > 40;
      checkResults[0].passed = keptPhrases.length === 0;
      checkResults[1].passed = hasSubstance;
      checkResults[2].passed = isGenuinelyRewritten;
      if (keptPhrases.length === 0 && hasSubstance) return { score: 4, quality: 'good', title: 'Genuinely rewritten', summary: `You didn't borrow any of the original's vocabulary, which means you processed the idea and re-expressed it — that's real cognitive ownership. The ability to paraphrase accurately without copying is one of the most important academic skills there is.`, checks: checkResults, nextStep: 'Try this with an AI response you actually used recently — can you rewrite it without looking at it?' };
      if (keptPhrases.length <= 2 && hasSubstance) return { score: 3, quality: 'good', title: 'Mostly rewritten', summary: `Good effort. You kept ${keptPhrases.length > 0 ? `"${keptPhrases.join('", "')}"` : 'some phrasing'} from the original. These small carries can indicate you understood the word but didn't fully process the idea underneath it.`, checks: checkResults, nextStep: 'Replace the borrowed phrase(s) with completely different wording. Can you explain the same idea using a different angle?' };
      if (keptPhrases.length > 3) return { score: 1, quality: 'weak', title: 'Too close to the original', summary: `You kept ${keptPhrases.length} phrases from the original: "${keptPhrases.slice(0,3).join('", "')}". This is paraphrasing by rearranging, not genuinely rewriting. The exercise is asking you to process the idea and re-express it from scratch.`, checks: checkResults, nextStep: 'Close the original, wait 30 seconds, then explain the idea to yourself out loud — then write that.' };
      return { score: 2, quality: 'warn', title: 'Partial rewrite', summary: `Some original phrasing remains. The test of a genuine rewrite: would someone who hadn't seen the original recognize this as your natural writing voice? If not, you still have some processing to do.`, checks: checkResults, nextStep: 'Read your version aloud. Does it sound like you, or does it sound like academic AI text?' };
    }

    case 5: { // Argue against AI
      const attacksAssumption = text.includes('process') || text.includes('purpose') || text.includes('point of') || text.includes('education is') || text.includes('not just') || text.includes('about more than') || text.includes('why we');
      const hasExample = text.includes('example') || text.includes('like') || text.includes('analogy') || text.includes('imagine') || text.includes('just as') || text.includes('similar to') || text.includes('same as');
      const hasReasoning = text.includes('because') || text.includes('therefore') || text.includes('means that') || text.includes('this shows') || text.includes('if') || text.includes('when');
      checkResults[0].passed = attacksAssumption;
      checkResults[1].passed = hasReasoning;
      checkResults[2].passed = hasExample;
      if (attacksAssumption && hasReasoning) return { score: 4, quality: 'good', title: 'Strong counter-argument', summary: `You attacked the right assumption — that education is about output quality rather than the process of developing thinking. This is exactly where the AI's argument is weakest. If you also used an analogy or example, that's excellent rhetorical technique.`, checks: checkResults, nextStep: 'Now steelman the AI\'s argument — what\'s the best version of it? Then counter that.' };
      if (hasReasoning && wordCount > 60) return { score: 3, quality: 'good', title: 'Good reasoning, stronger target needed', summary: `You gave a reasoned response, but check whether you attacked the core assumption (that output quality is all that matters) or just said "process matters." The goal is to expose why that assumption is wrong, not just assert that it is.`, checks: checkResults, nextStep: 'Ask: what does the AI\'s argument assume about the purpose of education? Attack that assumption specifically.' };
      return { score: 2, quality: 'warn', title: 'Counter-claim without argument', summary: `You disagreed with the AI but didn't build a full argument. Counter-arguments need reasoning — why is the AI wrong? What assumption are they making? What evidence or logic undermines their position?`, checks: checkResults, nextStep: 'Start with: "The AI\'s argument assumes X, but this is wrong because Y."' };
    }

    case 6: { // Should you use AI
      const hasAllFour = (text.includes('a)') || text.includes('scenario a') || text.match(/^a[:\.]|\ba\)/im)) &&
                         (text.includes('b)') || text.includes('scenario b') || text.match(/^b[:\.]|\bb\)/im)) &&
                         (text.includes('c)') || text.includes('scenario c') || text.match(/^c[:\.]|\bc\)/im)) &&
                         (text.includes('d)') || text.includes('scenario d') || text.match(/^d[:\.]|\bd\)/im));
      const hasDecisions = (text.includes('no ai') || text.includes('partial') || text.includes('use ai') || text.includes("don't use") || text.includes('yes') || text.includes('no'));
      const hasReasoning = (text.match(/because|since|as it|would|should|helps|hurts/gi) || []).length >= 2;
      checkResults[0].passed = hasAllFour;
      checkResults[1].passed = hasDecisions;
      checkResults[2].passed = hasReasoning;
      if (hasAllFour && hasDecisions && hasReasoning) return { score: 4, quality: 'good', title: 'Thoughtful regulation decisions', summary: `You addressed all four scenarios with decisions and reasoning — that's adaptive regulation in action. Notice that the skill isn't "use AI less" but "make conscious decisions about when AI helps vs. hurts your learning."`, checks: checkResults, nextStep: 'Take your rules from this exercise and apply them to your next real AI interaction.' };
      if (hasAllFour && hasDecisions) return { score: 3, quality: 'good', title: 'Good decisions, add reasoning', summary: `You covered all four scenarios and made decisions, but the reasoning could be deeper. The point isn't which answer is "right" — it's being able to explain what learning outcome is at stake in each choice.`, checks: checkResults, nextStep: 'Go back to one scenario and add a "because" with the specific learning outcome affected.' };
      if (!hasAllFour) return { score: 2, quality: 'warn', title: 'Missing some scenarios', summary: `The exercise asks you to address all four scenarios — each tests a different judgment call. Make sure you responded to A, B, C, and D specifically, not just the exercise in general.`, checks: checkResults, nextStep: 'Address each scenario (A, B, C, D) with a clear decision and one sentence of reasoning.' };
      return { score: 1, quality: 'weak', title: 'Decisions without reasoning', summary: `Choosing "use AI" or "no AI" without reasoning is the same as following a rule without understanding it. The value of this exercise is explaining what's at stake in each decision — what would be lost if you made the wrong call?`, checks: checkResults, nextStep: 'Pick one scenario and explain specifically what learning outcome is protected by your decision.' };
    }

    case 7: { // Design your own rules
      const ruleCount = (text.match(/\d\.|rule \d|first|second|third|fourth|fifth/gi) || []).length;
      const hasWhys = (text.match(/because|so that|in order to|to protect|ensures|helps me|builds|preserves/gi) || []).length;
      const isSpecific = wordCount > 80;
      checkResults[0].passed = ruleCount >= 2 || wordCount > 100;
      checkResults[1].passed = hasWhys >= 2;
      checkResults[2].passed = isSpecific;
      if ((ruleCount >= 3 || wordCount > 120) && hasWhys >= 2) return { score: 4, quality: 'good', title: 'Strong personal rules', summary: `You wrote specific rules with real reasoning behind them. The difference between these and generic advice is that you know why each rule protects your learning — which means you'll actually follow them.`, checks: checkResults, nextStep: 'Screenshot or write these rules somewhere visible. The hardest part is keeping them when you\'re under deadline pressure.' };
      if ((ruleCount >= 2 || wordCount > 80) && hasWhys >= 1) return { score: 3, quality: 'good', title: 'Good start — add more whys', summary: `You have some rules with reasoning, but a few feel more like policies than principles. For each rule, push yourself to answer: what specific cognitive skill does this protect, and what happens if I break it?`, checks: checkResults, nextStep: 'Take your weakest rule and add a specific "because" — name the learning mechanism it protects.' };
      if (wordCount > 50 && hasWhys < 2) return { score: 2, quality: 'warn', title: 'Rules without reasons', summary: `You listed rules but the reasoning is thin. Rules without "because" are easy to abandon when you're in a hurry. The reason is what makes the rule worth keeping.`, checks: checkResults, nextStep: 'For each rule, ask yourself: what would I lose if I broke this? Write that down.' };
      return { score: 1, quality: 'weak', title: 'Too vague to be useful', summary: `Rules like "use AI responsibly" don't help in practice — they don't tell you what to do in a specific situation. Make your rules concrete enough that you could follow them right now, today.`, checks: checkResults, nextStep: 'Start over. Complete this sentence: "I will never [specific AI action] when [specific situation] because it would [specific learning harm]."' };
    }

    case 8: { // Unpack AI session
      const hasAI = text.includes('ai') || text.includes('chatgpt') || text.includes('claude') || text.includes('gemini') || text.includes('it') || text.includes('tool');
      const hasMe = text.includes('i ') || text.includes("i'") || text.includes('my ') || text.includes('myself') || text.includes('i wrote') || text.includes('i thought') || text.includes('i chose');
      const hasLearned = text.includes('learned') || text.includes('understand') || text.includes('realized') || text.includes('now i') || text.includes('i now') || text.includes('made me') || text.includes('helped me see') || text.includes('i know');
      const separates = hasAI && hasMe;
      checkResults[0].passed = separates;
      checkResults[1].passed = hasMe && wordCount > 50;
      checkResults[2].passed = hasLearned;
      if (separates && hasLearned && wordCount > 70) return { score: 4, quality: 'good', title: 'Strong reflection', summary: `You clearly separated AI's contribution from yours and articulated what you actually learned. This kind of reflection — done consistently — is what turns AI use from outsourcing into genuine learning. The habit of asking "what did I contribute?" is the core of reflective integration.`, checks: checkResults, nextStep: 'Make this a habit: one sentence of reflection after every AI session. What did I contribute? What did I learn?' };
      if (separates && wordCount > 50) return { score: 3, quality: 'good', title: 'Good separation, deepen the learning', summary: `You separated AI and your contributions well. The missing piece is clarity on what you actually learned — not what the AI produced, but what changed in your own understanding. Can you articulate that specifically?`, checks: checkResults, nextStep: 'Complete this: "Before this session I thought X. Now I think Y. The change happened because..."' };
      if (!separates) return { score: 2, quality: 'warn', title: 'Contributions not clearly separated', summary: `Reflective integration requires distinguishing between what AI did and what you did. If those feel the same, that's the problem — it means the AI contribution replaced your contribution instead of supplementing it.`, checks: checkResults, nextStep: 'Try again. Write two separate bullet points: "AI contributed:" and "I contributed:"' };
      return { score: 1, quality: 'weak', title: 'Reflection too surface-level', summary: `A strong reflection is specific: what task, what AI response, what you added, what you learned. Vague reflections like "it was helpful" don't reveal anything about your cognitive engagement.`, checks: checkResults, nextStep: 'Think of one specific AI interaction. Describe exactly what you asked, what it answered, and what you had to add yourself.' };
    }

    case 9: { // Before and after
      const hasBefore = text.includes('before') || text.includes('used to') || text.includes('thought') || text.includes('didn\'t know') || text.includes('wasn\'t sure');
      const hasAfter = text.includes('now') || text.includes('after') || text.includes('understand') || text.includes('learned') || text.includes('realize') || text.includes('see');
      const hasCause = text.includes('because') || text.includes('ai') || text.includes('both') || text.includes('myself') || text.includes('thinking') || text.includes('worked out');
      const hasSpecific = wordCount > 60;
      checkResults[0].passed = hasSpecific;
      checkResults[1].passed = hasBefore && hasAfter;
      checkResults[2].passed = hasCause;
      if (hasBefore && hasAfter && hasCause && hasSpecific) return { score: 4, quality: 'good', title: 'Clear learning trace', summary: `You traced a genuine change in understanding — before, after, and the cause. This is one of the most useful self-assessment tools you can develop. The ability to answer "what caused this change?" tells you whether to trust the learning or repeat it.`, checks: checkResults, nextStep: 'Do this exercise once a week with any topic where AI helped. It reveals whether AI use leads to learning or just output.' };
      if (hasBefore && hasAfter) return { score: 3, quality: 'good', title: 'Good before/after — add the cause', summary: `You tracked what changed, which is good. The missing piece is the cause: was the change driven by the AI explanation, your own thinking, the combination, or something else? That distinction matters for replicating the learning.`, checks: checkResults, nextStep: 'Add: "This change happened because..." and be honest about AI\'s role vs. your own thinking\'s role.' };
      if (hasSpecific) return { score: 2, quality: 'warn', title: 'Missing the before or after', summary: `The exercise requires both a "before" state and an "after" state. Without both, you can't trace whether learning actually occurred. One of them seems vague or missing.`, checks: checkResults, nextStep: 'Structure it: "Before: I thought... After: Now I think... Because..."' };
      return { score: 1, quality: 'weak', title: 'Too vague to trace learning', summary: `Your response is too general to reveal a learning trace. Name a specific concept, describe your specific misconception before, and describe the specific understanding after.`, checks: checkResults, nextStep: 'Pick one concrete concept. Not "AI topics" — something specific like "how transformers work" or "what confirmation bias means."' };
    }

    case 10: { // Teach it back
      const hasPlainLanguage = !text.includes('furthermore') && !text.includes('paradigm') && !text.includes('aforementioned') && !text.includes('utilize') && !text.includes('heretofore');
      const hasAnalogy = text.includes('like') || text.includes('similar to') || text.includes('think of') || text.includes('imagine') || text.includes('same as') || text.includes('kind of');
      const hasMechanism = text.includes('because') || text.includes('which means') || text.includes('so that') || text.includes('how') || text.includes('works by') || text.includes('causes') || text.includes('when');
      const isSufficient = wordCount > 50 && sentences >= 3;
      checkResults[0].passed = hasPlainLanguage && isSufficient;
      checkResults[1].passed = hasMechanism;
      checkResults[2].passed = isSufficient;
      if (hasPlainLanguage && hasMechanism && isSufficient) return { score: 4, quality: 'good', title: 'Clear and genuine explanation', summary: `You explained the concept in plain language with some sense of how it works — not just what it is. The ability to teach something simply is one of the most reliable tests of genuine understanding. If you used an analogy, that's even better.`, checks: checkResults, nextStep: 'Share this explanation with someone who doesn\'t know the topic. Their questions will show you exactly where your understanding still has gaps.' };
      if (isSufficient && hasPlainLanguage) return { score: 3, quality: 'good', title: 'Good explanation — add the mechanism', summary: `You described what the concept is, but explaining how it works or why it matters would deepen the explanation. "It's a process where X happens" is stronger than "it's when you X."`, checks: checkResults, nextStep: 'Add one sentence: "It works by..." or "This matters because..."' };
      if (!isSufficient) return { score: 2, quality: 'warn', title: 'Too brief for a genuine explanation', summary: `3–5 sentences are needed because teaching requires unpacking. A one-sentence definition shows recognition, not understanding. The test is whether a non-expert could follow your explanation.`, checks: checkResults, nextStep: 'Write 3 more sentences. Cover: what it is, how it works, and why it matters or an example.' };
      return { score: 1, quality: 'weak', title: 'Jargon-heavy or unclear', summary: `An explanation full of technical terms works for people who already know the topic — it doesn't test understanding. The Feynman test is specifically about stripping away jargon and explaining the core idea.`, checks: checkResults, nextStep: 'Pretend you\'re explaining to a 12-year-old. Use no technical terms at all.' };
    }

    default: {
      // Generic fallback for any future exercises
      const quality = hitRate > 0.3 && wordCount > 60 ? 'good' : hitRate > 0.15 && wordCount > 40 ? 'warn' : 'weak';
      const score = quality === 'good' ? 3 : quality === 'warn' ? 2 : 1;
      checkResults.forEach(c => { c.passed = quality === 'good'; });
      return {
        score,
        quality,
        title: quality === 'good' ? 'Good response' : quality === 'warn' ? 'Needs more depth' : 'Needs development',
        summary: quality === 'good'
          ? `Your response engages meaningfully with the exercise. You covered the main ideas with appropriate reasoning.`
          : `Your response addresses the exercise but could go deeper. Try to engage more specifically with the concepts and explain your reasoning.`,
        checks: checkResults,
        nextStep: quality === 'good' ? 'Push further — what would a level-4 response add that yours doesn\'t?' : 'Identify one specific claim in your response and add a "because" to explain it.'
      };
    }
  }
}

function buildFeedbackHTML(result) {
  const scoreColor = result.score >= 4 ? '#1D9E75' : result.score === 3 ? '#5DCAA5' : result.score === 2 ? '#EF9F27' : '#E24B4A';
  const scorePct = Math.round(result.score / 4 * 100);

  const checksHTML = result.checks.length > 0
    ? `<div class="checklist">${result.checks.map(c => `<div class="check-item"><span class="check-icon">${c.passed ? '✓' : '○'}</span><span>${c.label}</span></div>`).join('')}</div>`
    : '';

  return `<div class="feedback-box ${result.quality}">
    <div class="feedback-label">Feedback</div>
    <div class="score-badge" style="color:${scoreColor}">
      Score: ${result.score}/4 — ${result.title}
    </div>
    <div class="score-bar-wrap">
      <div class="score-bar-fill" style="width:${scorePct}%; background:${scoreColor};"></div>
    </div>
    <div>${result.summary}</div>
    ${checksHTML}
    <div class="next-step">→ <strong>Next step:</strong> ${result.nextStep}</div>
  </div>`;
}
// ===== STATE =====
let currentView = 'dashboard';
let currentQ = 0;
let quizAnswers = [];
let selectedAnswer = null;
let activeExercise = 0;
let exerciseStates = {};
let filterDim = 'all';

let appData = {
  scores: { "Critical Evaluation": 2, "Cognitive Autonomy": 1, "Adaptive Regulation": 3, "Reflective Integration": 2 },
  history: [],
  sessionsCount: 3,
  exercisesDone: 7,
  xp: 120
};

// ===== INIT =====
window.addEventListener('DOMContentLoaded', () => {
  loadData();
  renderDashboard();
});

function loadData() {
  try {
    const raw = localStorage.getItem('resiliai-data');
    if (raw) appData = { ...appData, ...JSON.parse(raw) };
  } catch(e) {}
}

function saveData() {
  localStorage.setItem('resiliai-data', JSON.stringify(appData));
}

// ===== NAVIGATION =====
function showView(view) {
  ['dashboard','assessment','training'].forEach(v => {
    document.getElementById('view-' + v).classList.toggle('hidden', v !== view);
  });
  document.querySelectorAll('.nav-btn').forEach(b => {
    b.classList.toggle('active', b.dataset.view === view);
  });
  currentView = view;
  if (view === 'assessment') initQuiz();
  if (view === 'training') initTraining();
  if (view === 'dashboard') renderDashboard();
}

// ===== STATE INDICATOR =====
function updateStateIndicator(level) {
  const map = {1:'thoughtless',2:'cautious',3:'collaborative',4:'reflective'};
  const labels = {1:'Thoughtless',2:'Cautious',3:'Collaborative',4:'Reflective'};
  const l = Math.max(1, Math.min(4, Math.round(level)));
  const ind = document.getElementById('state-indicator');
  ind.className = 'state-pill state-' + map[l];
  document.getElementById('state-text').textContent = labels[l];
}

// ===== HELPERS =====
function overallScore() {
  const vals = Object.values(appData.scores);
  return (vals.reduce((a,b) => a+b, 0) / vals.length).toFixed(1);
}
function weakestDim() {
  return Object.entries(appData.scores).sort((a,b) => a[1]-b[1])[0][0];
}
function dimColor(lvl) {
  return ['','#E24B4A','#EF9F27','#1D9E75','#378ADD'][Math.min(4, Math.max(1, Math.round(lvl)))];
}
function xpLevel() {
  const xp = appData.xp || 0;
  return { xp, level: Math.floor(xp/100)+1, next: (Math.floor(xp/100)+1)*100, pct: (xp % 100) };
}

// ===== DASHBOARD =====
function renderDashboard() {
  const overall = overallScore();
  const lvl = Math.min(4, Math.max(1, Math.round(parseFloat(overall))));
  updateStateIndicator(lvl);
  const xpInfo = xpLevel();

  let historyHTML = '';
  if (appData.history.length > 0) {
    historyHTML = `<div class="history-section">
      <div class="section-title">Score history (${appData.history.length} past session${appData.history.length>1?'s':''})</div>
      <div class="history-rows">
        ${DIMS.map(dim => {
          const past = appData.history.map(h => h.scores[dim] || 0);
          const cur = appData.scores[dim];
          const all = [...past, cur];
          const bars = all.map((v,i) => {
            const pct = Math.round(v/4*100);
            const c = dimColor(v);
            const isCur = i === all.length-1;
            return `<div class="history-bar" style="height:${pct}%;background:${c};opacity:${isCur?1:0.4};" data-val="${v.toFixed(1)}${isCur?' (now)':''}"></div>`;
          }).join('');
          const c = dimColor(cur);
          return `<div class="history-row">
            <div class="history-label">${dim}</div>
            <div class="history-bars">${bars}</div>
            <div class="history-score" style="color:${c}">${cur}</div>
          </div>`;
        }).join('')}
      </div>
    </div>`;
  }

  document.getElementById('view-dashboard').innerHTML = `
    <div class="metrics">
      <div class="metric">
        <div class="metric-label">Overall CR Score</div>
        <div class="metric-value">${overall}</div>
        <div class="metric-sub">${LEVEL_LABELS[lvl]}</div>
      </div>
      <div class="metric">
        <div class="metric-label">Sessions</div>
        <div class="metric-value">${appData.sessionsCount}</div>
        <div class="metric-sub">Total completed</div>
      </div>
      <div class="metric">
        <div class="metric-label">Exercises done</div>
        <div class="metric-value">${appData.exercisesDone}</div>
        <div class="metric-sub">of ${EXERCISES.length} total</div>
      </div>
      <div class="metric">
        <div class="metric-label">Focus area</div>
        <div class="metric-value" style="font-size:17px;">${weakestDim().split(' ')[0]}</div>
        <div class="metric-sub">Lowest dimension</div>
      </div>
    </div>

    <div class="xp-bar-wrap">
      <div class="xp-row">
        <div class="xp-label">Level ${xpInfo.level} · ${xpInfo.xp} XP total</div>
        <div class="xp-val">${xpInfo.pct}/100 XP to next level</div>
      </div>
      <div class="xp-track"><div class="xp-fill" style="width:${xpInfo.pct}%"></div></div>
    </div>

    <div class="section-title">Cognitive resilience profile</div>
    <div class="dims-grid">
      ${DIMS.map(dim => {
        const v = appData.scores[dim];
        const l = Math.min(4, Math.max(1, Math.round(v)));
        return `<div class="dim-card">
          <div class="dim-header">
            <div class="dim-name">${dim}</div>
            <div class="dim-level level-${l}">${LEVEL_LABELS[l]} · ${v}/4</div>
          </div>
          <div class="progress-track"><div class="progress-fill fill-${l}" style="width:${Math.round(v/4*100)}%"></div></div>
          <div class="dim-desc">${LEVEL_DESC[dim][l]}</div>
        </div>`;
      }).join('')}
    </div>
    ${historyHTML}
    <div class="actions">
      <button class="btn btn-primary" onclick="showView('training')">Start training →</button>
      <button class="btn" onclick="showView('assessment')">Retake assessment</button>
      <button class="btn btn-danger btn-sm" onclick="resetData()">Reset data</button>
    </div>`;
}

function resetData() {
  if (!confirm('Reset all ResilliAI data? This cannot be undone.')) return;
  appData = { scores:{"Critical Evaluation":2,"Cognitive Autonomy":1,"Adaptive Regulation":3,"Reflective Integration":2}, history:[], sessionsCount:0, exercisesDone:0, xp:0 };
  exerciseStates = {};
  saveData();
  renderDashboard();
}

// ===== ASSESSMENT =====
function initQuiz() {
  currentQ = 0; quizAnswers = []; selectedAnswer = null;
  document.getElementById('view-assessment').innerHTML = `<div class="quiz-wrap"><div class="quiz-card">
    <div class="quiz-prog-bar"><div class="quiz-prog-fill" id="quiz-prog" style="width:0%"></div></div>
    <div id="quiz-dim-tag" class="quiz-dim-tag"></div>
    <div id="quiz-q" class="quiz-q"></div>
    <div id="quiz-opts" class="quiz-options"></div>
    <div class="quiz-nav">
      <span class="quiz-counter" id="quiz-counter"></span>
      <button class="btn btn-primary" id="quiz-next" onclick="nextQuestion()" style="display:none">Next →</button>
    </div>
  </div></div>`;
  renderQuestion();
}

function renderQuestion() {
  const q = QUESTIONS[currentQ];
  document.getElementById('quiz-prog').style.width = (currentQ/QUESTIONS.length*100)+'%';
  document.getElementById('quiz-dim-tag').textContent = q.dim;
  document.getElementById('quiz-q').textContent = q.q;
  document.getElementById('quiz-counter').textContent = `Question ${currentQ+1} of ${QUESTIONS.length}`;
  document.getElementById('quiz-next').style.display = 'none';
  selectedAnswer = null;
  const optsEl = document.getElementById('quiz-opts');
  optsEl.innerHTML = '';
  q.opts.forEach((opt,i) => {
    const btn = document.createElement('button');
    btn.className = 'quiz-option';
    btn.textContent = opt;
    btn.onclick = () => {
      document.querySelectorAll('.quiz-option').forEach(b => b.classList.remove('selected'));
      btn.classList.add('selected');
      selectedAnswer = i;
      document.getElementById('quiz-next').style.display = 'inline-flex';
      updateStateIndicator(i+1);
    };
    optsEl.appendChild(btn);
  });
}

function nextQuestion() {
  if (selectedAnswer === null) return;
  quizAnswers.push({ q: currentQ, a: selectedAnswer, dim: QUESTIONS[currentQ].dim });
  currentQ++;
  if (currentQ >= QUESTIONS.length) showQuizResults();
  else renderQuestion();
}

function showQuizResults() {
  const newScores = {};
  const counts = {};
  DIMS.forEach(d => { newScores[d]=0; counts[d]=0; });
  quizAnswers.forEach(a => { newScores[a.dim]+=a.a; counts[a.dim]++; });
  DIMS.forEach(d => { newScores[d]=parseFloat((newScores[d]/counts[d]/3*4).toFixed(1)); });

  appData.history.push({ date: new Date().toLocaleDateString(), scores: {...appData.scores} });
  if (appData.history.length > 8) appData.history.shift();
  appData.scores = newScores;
  appData.sessionsCount = (appData.sessionsCount||0)+1;
  appData.xp = (appData.xp||0)+30;
  saveData();

  document.querySelector('.quiz-card').innerHTML = `
    <div style="text-align:center;margin-bottom:24px;">
      <div style="font-size:22px;font-weight:600;margin-bottom:6px;">Assessment complete</div>
      <div style="font-size:13px;color:#5A5A5A;">+30 XP · Results saved</div>
    </div>
    ${DIMS.map(d => {
      const v = newScores[d];
      const l = Math.min(4,Math.max(1,Math.round(v)));
      return `<div class="dim-card" style="margin-bottom:10px;">
        <div class="dim-header">
          <div class="dim-name">${d}</div>
          <div class="dim-level level-${l}">${LEVEL_LABELS[l]} · ${v}/4</div>
        </div>
        <div class="progress-track"><div class="progress-fill fill-${l}" style="width:${Math.round(v/4*100)}%"></div></div>
      </div>`;
    }).join('')}
    <button class="btn btn-primary" style="width:100%;justify-content:center;margin-top:14px;" onclick="showView('training')">Go to training →</button>`;
}

// ===== TRAINING =====
function getFiltered() {
  return filterDim === 'all' ? EXERCISES : EXERCISES.filter(e => e.dim === filterDim);
}

function initTraining() { renderTrainingPanel(); }

function renderTrainingPanel() {
  const filtered = getFiltered();
  const weakest = weakestDim();
  const donePct = Math.round(Object.keys(exerciseStates).filter(k=>exerciseStates[k]==='done').length/EXERCISES.length*100);

  const listHTML = filtered.map(ex => {
    const done = exerciseStates[ex.id]==='done';
    const isActive = ex.id===activeExercise;
    return `<div class="ex-item ${isActive?'active':''} ${done?'done':''}" onclick="selectExercise(${ex.id})">
      <div class="ex-item-title">${done?'✓ ':''}${ex.title}</div>
      <div class="ex-item-dim">${ex.dim}</div>
    </div>`;
  }).join('');

  document.getElementById('view-training').innerHTML = `
    <div class="notice">Recommended focus: <strong>${weakest}</strong> — your lowest dimension. ${donePct}% of exercises completed this session.</div>
    <div class="exercise-panel">
      <div class="ex-sidebar">
        <div class="sidebar-title">Exercises (${EXERCISES.length})</div>
        <div class="dim-filters">
          <button class="filter-btn ${filterDim==='all'?'active':''}" onclick="setFilter('all')">All</button>
          ${DIMS.map(d=>`<button class="filter-btn ${filterDim===d?'active':''}" onclick="setFilter('${d}')">${d.split(' ')[0]}</button>`).join('')}
        </div>
        <div class="ex-list">${listHTML}</div>
      </div>
      <div class="ex-main" id="exercise-main"></div>
    </div>`;

  const ex = filtered.find(e=>e.id===activeExercise)||filtered[0];
  if (ex) { activeExercise=ex.id; renderExercise(ex.id); }
}

function setFilter(dim) {
  filterDim = dim;
  const filtered = getFiltered();
  if (!filtered.find(e=>e.id===activeExercise)) activeExercise=filtered[0]?.id??0;
  renderTrainingPanel();
}

function selectExercise(id) {
  activeExercise = id;
  document.querySelectorAll('.ex-item').forEach((el,i) => {
    el.classList.toggle('active', getFiltered()[i]?.id===id);
  });
  renderExercise(id);
}

function renderExercise(id) {
  const ex = EXERCISES.find(e=>e.id===id);
  if(!ex) return;
  document.getElementById('exercise-main').innerHTML = `
    <div class="ex-header">
      <div class="ex-title-wrap">
        <div class="ex-title">${ex.title}</div>
        <div class="ex-dim-sub">${ex.dim}</div>
      </div>
      <div class="ex-badge">${ex.badge}</div>
    </div>
    <div class="ex-prompt">${ex.prompt}</div>
    <div>
      <div class="field-label">Your response</div>
      <textarea id="resp-${id}" class="user-textarea" placeholder="Write your response here..."></textarea>
    </div>
    <div class="ex-actions">
      <button class="btn btn-primary" onclick="submitExercise(${id})">Get feedback →</button>
      <button class="btn btn-sm" onclick="toggleHint(${id})">Hint</button>
    </div>
    <div id="hint-${id}" class="hint-box" style="display:none;"><div class="field-label">Hint</div>${ex.hint}</div>
    <div id="feedback-${id}"></div>
    <div id="reveal-${id}" style="display:none;">
      <div class="field-label">Reference response</div>
      <div class="ai-response-box">${ex.aiResponse}</div>
    </div>`;
}

function toggleHint(id) {
  const h = document.getElementById('hint-'+id);
  h.style.display = h.style.display==='none'?'block':'none';
}

function submitExercise(id) {
  const userResp = document.getElementById('resp-'+id)?.value.trim();
  if (!userResp) { alert('Please write a response first.'); return; }

  const result = analyzResponse(id, userResp);
  const feedbackEl = document.getElementById('feedback-'+id);
  feedbackEl.innerHTML = buildFeedbackHTML(result);

  // show reference
  document.getElementById('reveal-'+id).style.display = 'block';

  // update state indicator
  updateStateIndicator(result.score);

  // award XP and mark done
  if (exerciseStates[id] !== 'done') {
    exerciseStates[id] = 'done';
    appData.exercisesDone = (appData.exercisesDone||0)+1;
    const xpGain = result.score >= 4 ? 25 : result.score === 3 ? 15 : result.score === 2 ? 8 : 3;
    appData.xp = (appData.xp||0)+xpGain;
    saveData();

    // update sidebar item
    const filtered = getFiltered();
    const items = document.querySelectorAll('.ex-item');
    filtered.forEach((e,i) => {
      if (e.id===id && items[i]) {
        items[i].classList.add('done');
        items[i].querySelector('.ex-item-title').textContent = '✓ '+e.title;
      }
    });
  }
}
  </script>
